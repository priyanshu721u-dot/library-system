<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadON - Blogs</title>
    <link rel="icon" href="../assets/Icon.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/blogs.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="../assets/ReadON.png" alt="ReadON">
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-title">Main Menu</div>
            <a href="dashboard.html">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="catalog.html">
                <i class="fas fa-book"></i> Book Catalog
            </a>
            <a href="blogs.html" class="active">
                <i class="fas fa-pen"></i> Blogs
            </a>
            <a href="history.html">
                <i class="fas fa-history"></i> My Borrowing History
            </a>
            <div class="nav-section-title">Account</div>
            <a href="profile.html">
                <i class="fas fa-user"></i> Manage My Account
            </a>
        </nav>
        <div class="sidebar-bottom">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar" id="userAvatar">S</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="userName">Student</div>
                    <div class="sidebar-user-role">Student</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:1rem;">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-left">
                    <h1>Blogs</h1>
                    <p>Read latest news and announcements</p>
                </div>
            </div>
            <div class="topbar-right">
                <a href="profile.html" class="topbar-icon">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page-content">

            <!-- BANNER -->
            <div class="dashboard-banner">
                <div class="banner-text">
                    <h2>Library Blogs</h2>
                    <p>Stay updated with the latest news and announcements.</p>
                </div>
                <i class="fas fa-pen banner-icon"></i>
            </div>

            <!-- BLOGS GRID -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-newspaper"></i> All Posts
                    </div>
                    <span id="blogCount" style="font-size:0.85rem; color:var(--text-gray);">0 posts</span>
                </div>
                <div class="blogs-grid" id="blogsGrid">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading blogs...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- BLOG DETAIL MODAL -->
    <div class="modal-overlay" id="blogModal" style="display:none;">
        <div class="modal blog-modal">
            <div class="modal-header">
                <h3 id="modalBlogTitle">Blog Title</h3>
                <button class="modal-close" id="closeBlogModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="blog-modal-meta" id="modalBlogMeta"></div>
                <div class="blog-modal-content" id="modalBlogContent"></div>
                <div class="blog-modal-comments">
                    <h4><i class="fas fa-comments"></i> Comments</h4>
                    <div id="commentsList"></div>
                    <div class="comment-form">
                        <div class="input-wrapper">
                            <i class="fas fa-comment"></i>
                            <input type="text" id="commentInput" placeholder="Write a comment...">
                        </div>
                        <button class="btn-comment" id="submitComment">
                            <i class="fas fa-paper-plane"></i> Post
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/blogs.js"></script>
</body>
</html>
